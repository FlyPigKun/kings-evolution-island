<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="landscape" />
  <title>王者进化岛</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { width: 100%; height: 100%; }
    #rotate-notice {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a1a2e; color: #e0e0e0;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; font-family: sans-serif; font-size: 18px;
    }
    #rotate-notice .icon { font-size: 60px; margin-bottom: 20px; }
    @media (orientation: portrait) {
      #rotate-notice { display: flex !important; }
      #game-container { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="rotate-notice">
    <div class="icon">📱↻</div>
    <div>请横屏游玩</div>
    <div style="font-size:14px;margin-top:8px;color:#888">Please rotate your device</div>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
